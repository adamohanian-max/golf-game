<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Golf</title>
  <style>
    html,body{margin:0;height:100%;background:#1b5e34;color:#f5f5f0;
      font-family:-apple-system,system-ui,sans-serif;display:flex;
      align-items:center;justify-content:center;text-align:center}
    .msg{padding:24px;max-width:20rem;line-height:1.5}
  </style>
</head>
<body>
  <!-- Bundled fallback shell. The app normally loads the live site via Capacitor
       server.url; this only appears if that URL is unreachable. -->
  <div class="msg">
    <h1>Golf</h1>
    <p>Couldn't reach the course server. Check your connection and reopen the app.</p>
  </div>
</body>
</html>
