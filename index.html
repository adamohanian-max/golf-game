<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Golf — Phase 1</title>
  <link rel="stylesheet" href="style.css?v=36">
</head>
<body>
  <canvas id="game"></canvas>

  <!-- iOS web-haptic hack: toggling a <input switch> emits a system tick on iOS 17.4+
       (iOS Safari has no navigator.vibrate). Kept off-screen, not display:none. -->
  <label id="haptic-switch" aria-hidden="true"><input type="checkbox" switch></label>

  <div id="scorecard">
    <span class="line"><b id="holeLabel">Hole 1</b></span>
    <span class="line" id="course"></span>
    <span class="line">Par <span id="par">4</span> · <span id="yards">450</span> yds</span>
    <span class="line">Strokes: <span id="strokes">0</span></span>
    <span class="line">Score: <span id="score">E</span></span>
  </div>

  <div id="stats" class="hidden">
    <div class="srow"><span class="slabel">Lie</span><span class="sval" id="st-lie">—</span></div>
    <div class="snote" id="st-lie-note"></div>
    <div class="srow"><span class="slabel">Carry</span><span class="sval" id="st-carry">—</span></div>
    <div class="srow"><span class="slabel">Total</span><span class="sval" id="st-total">—</span></div>
    <div class="srow"><span class="slabel">Ball speed</span><span class="sval" id="st-speed">—</span></div>
    <div class="srow"><span class="slabel">To pin</span><span class="sval" id="st-pin">—</span></div>
  </div>

  <div id="course-menu" class="hidden">
    <div class="cm-box">
      <h2>Select Hole</h2>
      <div id="hole-grid"></div>
      <div class="cm-actions">
        <button id="cm-resume" class="menu-btn secondary">Resume</button>
        <button id="cm-home" class="menu-btn">Home</button>
      </div>
    </div>
  </div>

  <button id="hud-btn" class="hidden" aria-label="Controls">···</button>
  <div id="hud-menu" class="hidden">
    <div id="hm-club-row">
      <button class="hm-step" id="hm-club-down" aria-label="Shorter club">−</button>
      <div id="hm-club-cur"><b id="hm-club-name">Driver</b><small id="hm-club-yds">282y</small></div>
      <button class="hm-step" id="hm-club-up" aria-label="Longer club">+</button>
    </div>
    <div id="hm-course-items">
      <div class="hm-sep"></div>
      <button class="hm-item" id="hm-aim">⛳ Aim</button>
      <button class="hm-item" id="hm-measure">📏 Range finder</button>
      <button class="hm-item" id="hm-slope">⛰ Slope</button>
      <button class="hm-item" id="hm-card">📋 Scorecard</button>
      <div class="hm-sep"></div>
      <button class="hm-item" id="hm-holes">☰ Select hole</button>
    </div>
  </div>

  <div id="hint">Swipe to swing · ← → to aim</div>

  <div id="range-ui" class="hidden">
    <div class="range-row">
      <label for="range-slider">Target</label>
      <input id="range-slider" type="range" min="50" max="300" step="5" value="150">
      <span id="range-yards">150</span><span class="unit">yds</span>
      <button id="range-menu-btn">Menu</button>
    </div>
    <div id="range-result">Aim up the range</div>
  </div>

  <div id="menu">
    <div class="menu-box">
      <p class="menu-eyebrow">Pinehurst No. 2 &middot; 18 Holes</p>
      <h1>GOLF</h1>
      <div class="menu-divider"></div>
      <button id="play-course" class="menu-btn">Play Course</button>
      <button id="play-range" class="menu-btn secondary">Driving Range</button>
    </div>
  </div>

  <div id="result" class="hidden">
    <div class="result-box">
      <h2 id="result-title">In the hole!</h2>
      <p id="result-detail"></p>
      <button id="play-again">Next hole</button>
    </div>
  </div>

  <div id="round-end" class="hidden">
    <div class="re-box">
      <div class="re-header">
        <h2 id="re-header-title">Round Complete</h2>
        <p id="re-subtitle"></p>
      </div>
      <div class="re-tabs">
        <button class="re-tab active" data-panel="re-card">Scorecard</button>
        <button class="re-tab" data-panel="re-stats">Stats</button>
      </div>
      <div id="re-card" class="re-panel">
        <div class="re-sc-wrap" id="re-scorecard"></div>
      </div>
      <div id="re-stats" class="re-panel hidden">
        <div id="re-statslist"></div>
      </div>
      <div class="re-actions">
        <button id="re-home" class="menu-btn secondary">Home</button>
        <button id="re-replay" class="menu-btn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="game.js?v=38"></script>
</body>
</html>
